name: Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-test:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          # - os: windows-latest
          #   node-version: 22
          - os: macos-latest
            node-version: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install web-ui dependencies
        run: npm ci --prefix web-ui

      - name: Build
        run: npm run build

      - name: Check (agent instructions, lint, typecheck, root tests)
        run: npm run check

      - name: Web UI typecheck
        run: npm run web:typecheck

      - name: Web UI tests
        run: npm run web:test
